name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ImageMagick
        shell: pwsh
        run: choco install imagemagick --yes --no-progress

      - name: Configure
        run: cmake --preset windows-msvc

      - name: Build Release
        run: cmake --build --preset windows-msvc-release

      - name: Verify Windows Icon
        shell: pwsh
        run: |
          $generated = "build/windows-msvc/generated/Icon_Trigger.ico"
          $fallback = "Icon/Icon Trigger.ico"
          if (Test-Path $generated) {
            Write-Host "Using generated ICO: $generated"
          } elseif (Test-Path $fallback) {
            Write-Host "Generated ICO not found, using source ICO fallback: $fallback"
          } else {
            throw "No ICO found for release build"
          }

      - name: Build Installer
        shell: pwsh
        run: |
          $exe = "build/windows-msvc/EasyTrigger_artefacts/Release/Easy Trigger.exe"
          if (!(Test-Path $exe)) { throw "Release exe not found: $exe" }
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { throw "Inno Setup not found: $iscc" }
          & $iscc installer_trigger.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: easytrigger-win64
          path: Installer/EasyTrigger_Setup_*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ImageMagick
        run: brew install imagemagick

      - name: Configure
        run: cmake --preset macos-universal

      - name: Build Release
        run: cmake --build --preset macos-universal-release

      - name: Verify macOS Icon
        run: |
          set -euo pipefail
          if [ -f "Icon/Icon Trigger.icns" ]; then
            echo "Using source ICNS: Icon/Icon Trigger.icns"
          else
            echo "ERROR: No ICNS found for release build"
            exit 1
          fi

      - name: Package
        run: |
          set -euo pipefail
          APP_PATH=$(find build/macos-universal -type d -name "Easy Trigger.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Easy Trigger.app not found in build/macos-universal"
            find build/macos-universal -name "*.app" || true
            exit 1
          fi
          echo "Found app: $APP_PATH"
          VERSION=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' version.iss | head -1)
          echo "Version: $VERSION"
          VOLNAME="Easy Trigger ${VERSION}"
          STAGING=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGING/Easy Trigger.app"
          ln -sf /Applications "$STAGING/Applications"
          mkdir -p Installer
          DMG_RW="Installer/EasyTrigger-${VERSION}-rw.dmg"
          DMG_PATH="Installer/EasyTrigger-${VERSION}.dmg"
          hdiutil create -volname "$VOLNAME" -srcfolder "$STAGING" -ov -format UDRW "$DMG_RW"
          rm -rf "$STAGING"
          MOUNT_OUTPUT=$(hdiutil attach "$DMG_RW" -readwrite -nobrowse)
          echo "Attached: $MOUNT_OUTPUT"
          sleep 2
          MOUNT=$(printf '%s\n' "$MOUNT_OUTPUT" | awk -F'\t' '/\/Volumes\// {print $NF}' | tail -n 1)
          if [ -z "$MOUNT" ]; then
            MOUNT=$(hdiutil info | awk -v dmg="$DMG_RW" '
              $0 ~ dmg { found=1; next }
              found && /\/Volumes\// { print $1; exit }
            ')
          fi
          if [ ! -d "$MOUNT" ]; then
            echo "ERROR: Volume not mounted"
            echo "Expected volume name: $VOLNAME"
            echo "Resolved mount point: ${MOUNT:-<empty>}"
            ls /Volumes/
            exit 1
          fi
          ICNS_PATH="Icon/Icon Trigger.icns"
          if [ ! -f "$ICNS_PATH" ]; then
            echo "ERROR: No ICNS available for DMG volume icon"
            exit 1
          fi
          cp "$ICNS_PATH" "$MOUNT/.VolumeIcon.icns"
          xcrun SetFile -a V "$MOUNT/.VolumeIcon.icns" 2>/dev/null || true
          python3 cmake/set_dmg_icon.py "$MOUNT"
          hdiutil detach "$MOUNT" -quiet
          hdiutil convert "$DMG_RW" -ov -format UDZO -o "$DMG_PATH"
          rm -f "$DMG_RW"
          echo "DMG ready: $DMG_PATH"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: easytrigger-macos-universal
          path: Installer/EasyTrigger-*.dmg

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/easytrigger-win64/EasyTrigger_Setup_*.exe
            dist/easytrigger-macos-universal/EasyTrigger-*.dmg

          generate_release_notes: true
