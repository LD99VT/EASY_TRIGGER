name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify submodule
        shell: pwsh
        run: |
          if (!(Test-Path "third_party/SuperTimecodeConverter/TimecodeCore.h")) {
            throw "Submodule missing: third_party/SuperTimecodeConverter"
          }

      - name: Configure
        run: cmake --preset windows-msvc

      - name: Build Release
        run: cmake --build --preset windows-msvc-release

      - name: Package
        shell: pwsh
        run: |
          $exe = "build/windows-msvc/EasyTrigger_artefacts/Release/Easy Trigger v2.exe"
          if (!(Test-Path $exe)) { throw "Release exe not found: $exe" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path $exe -DestinationPath "dist/EasyTrigger-win64.zip" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: easytrigger-win64
          path: dist/EasyTrigger-win64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify submodule
        run: test -f third_party/SuperTimecodeConverter/TimecodeCore.h || (echo "Submodule missing" && exit 1)

      - name: Configure
        run: cmake --preset macos-universal

      - name: Build Release
        run: cmake --build --preset macos-universal-release

      - name: Package
        run: |
          APP_PATH=$(find build/macos-universal -type d -name "Easy Trigger v2.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Release app bundle not found"
            exit 1
          fi
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/EasyTrigger-macos-universal.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: easytrigger-macos-universal
          path: dist/EasyTrigger-macos-universal.zip

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/easytrigger-win64/EasyTrigger-win64.zip
            dist/easytrigger-macos-universal/EasyTrigger-macos-universal.zip
          generate_release_notes: true
